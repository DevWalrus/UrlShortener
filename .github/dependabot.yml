version: 2
updates:
  - package-ecosystem: npm
    directory: /creator-fe
    schedule:
      interval: weekly
    groups:
      npm-all:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /creator-fe/api
    schedule:
      interval: weekly
    groups:
      npm-all:
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: /redirect
    schedule:
      interval: weekly
    groups:
      go-all:
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: /creator-api
    schedule:
      interval: weekly
    groups:
      go-all:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /redirect
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /creator-api
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-all:
        patterns: ["*"]
