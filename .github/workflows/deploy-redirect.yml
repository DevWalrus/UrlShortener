name: Deploy Redirect Service

on:
  push:
    branches:
      - main
    paths:
      - 'redirect/**'
      - '.github/workflows/deploy-redirect.yml'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: clintenregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./redirect
          push: true
          tags: |
            clintenregistry.azurecr.io/clinten-redirect:latest
            clintenregistry.azurecr.io/clinten-redirect:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container App
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name clinten-redirect \
              --resource-group rg-clinten \
              --image clintenregistry.azurecr.io/clinten-redirect:${{ github.sha }}