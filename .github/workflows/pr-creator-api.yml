name: PR Checks - Creator API

on:
  pull_request:
    paths:
      - 'creator-api/**'
      - '.github/workflows/pr-creator-api.yml'
      - '.github/workflows/pr-go-template.yml'

jobs:
  checks:
    uses: ./.github/workflows/pr-go-template.yml
    with:
      service: creator-api
      coverage_threshold: 90
