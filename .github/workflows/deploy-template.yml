name: Deploy Template

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: "Folder name and image name, e.g. 'redirect' or 'creator-api'"
      container_app_name:
        required: true
        type: string
        description: "Azure Container App resource name"
      image_tag:
        required: false
        type: string
        default: "latest"
        description: "Docker image tag to push and deploy (e.g. 'latest' or 'stage')"
      environment:
        required: false
        type: string
        default: "prod"
        description: "GitHub environment to deploy to"
      health_url:
        required: true
        type: string
        description: "Full URL to the /health endpoint to verify after deploy"
    secrets:
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  contents: read
  id-token: write  # required for OIDC azure/login

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: ${{ inputs.service_name }}/go.mod
          cache-dependency-path: ${{ inputs.service_name }}/go.sum

      - name: Run tests
        run: go test $(go list ./... | grep -Ev '/db|/cmd')
        working-directory: ${{ inputs.service_name }}

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to ACR
        uses: docker/login-action@v4
        with:
          registry: clintenregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image (prod)
        if: inputs.image_tag == 'latest'
        uses: docker/build-push-action@v7
        with:
          context: ./${{ inputs.service_name }}
          push: true
          tags: |
            clintenregistry.azurecr.io/clinten-${{ inputs.service_name }}:latest
            clintenregistry.azurecr.io/clinten-${{ inputs.service_name }}:${{ github.sha }}

      - name: Build and push image (stage)
        if: inputs.image_tag != 'latest'
        uses: docker/build-push-action@v7
        with:
          context: ./${{ inputs.service_name }}
          push: true
          tags: |
            clintenregistry.azurecr.io/clinten-${{ inputs.service_name }}:${{ inputs.image_tag }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: clintenregistry.azurecr.io/clinten-${{ inputs.service_name }}:${{ inputs.image_tag }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container App (prod)
        if: inputs.image_tag == 'latest'
        uses: azure/cli@v3
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ inputs.container_app_name }} \
              --resource-group rg-clinten \
              --image clintenregistry.azurecr.io/clinten-${{ inputs.service_name }}:latest

      - name: Deploy to Container App (stage)
        if: inputs.image_tag != 'latest'
        uses: azure/cli@v3
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ inputs.container_app_name }} \
              --resource-group rg-clinten \
              --image clintenregistry.azurecr.io/clinten-${{ inputs.service_name }}:${{ inputs.image_tag }}

      - name: Smoke test
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ inputs.health_url }}")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 10 attempts"
          exit 1
