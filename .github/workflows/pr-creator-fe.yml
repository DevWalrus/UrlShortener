name: PR Checks - Creator UI

on:
  pull_request:
    paths:
      - 'creator-fe/**'
      - '.github/workflows/pr-creator-fe.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            creator-fe/package-lock.json
            creator-fe/api/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: creator-fe

      - name: Install API deps
        run: npm ci
        working-directory: creator-fe/api

      - name: Lint frontend
        run: npm run lint
        working-directory: creator-fe

      - name: Lint API
        run: npm run lint
        working-directory: creator-fe/api

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            creator-fe/package-lock.json
            creator-fe/api/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: creator-fe

      - name: Install API deps
        run: npm ci
        working-directory: creator-fe/api

      - name: Build frontend
        run: npm run build
        working-directory: creator-fe

      - name: Build API
        run: npm run build
        working-directory: creator-fe/api
