name: Deploy FE Template

on:
  workflow_call:
    inputs:
      environment:
        required: false
        type: string
        default: "prod"
        description: "GitHub environment to deploy to"
      health_url:
        required: true
        type: string
        description: "Full URL to the /api/health endpoint to verify after deploy"
    secrets:
      SWA_DEPLOYMENT_TOKEN:
        required: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            creator-fe/package-lock.json
            creator-fe/api/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: creator-fe

      - name: Install API deps
        run: npm ci
        working-directory: creator-fe/api

      - name: Lint frontend
        run: npm run lint
        working-directory: creator-fe

      - name: Lint API
        run: npm run lint
        working-directory: creator-fe/api

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: lint
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Deploy to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /creator-fe
          api_location: /creator-fe/api
          output_location: dist

      - name: Smoke test
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ inputs.health_url }}")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 10 attempts"
          exit 1
